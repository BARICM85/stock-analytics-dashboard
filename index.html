
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stock Analytics Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://s3.tradingview.com/tv.js"></script>
</head>

<body>

<h1>Stock Analytics Dashboard</h1>

<div class="grid">

<div class="card">
<h2>TradingView Chart</h2>
<div id="tradingview_chart"></div>
</div>

<div class="card">
<h2>Portfolio</h2>
<input id="symbol" placeholder="Symbol">
<input id="qty" placeholder="Qty">
<input id="price" placeholder="Buy Price">
<button onclick="addStock()">Add</button>

<table id="portfolioTable">
<tr>
<th>Symbol</th>
<th>Qty</th>
<th>Buy</th>
<th>Current</th>
<th>P&L</th>
</tr>
</table>
</div>

<div class="card">
<h2>Nifty Comparison</h2>
<button onclick="loadIndex('^NSEI')">NIFTY 50</button>
<button onclick="loadIndex('^NSEBANK')">BANK NIFTY</button>
<p id="indexValue"></p>
</div>

<div class="card">
<h2>Options Chain</h2>
<input id="optionSymbol" placeholder="Stock">
<button onclick="loadOptions()">Load</button>
<pre id="optionsData"></pre>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
