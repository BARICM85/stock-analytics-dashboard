
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced Stock Analytics Platform</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://s3.tradingview.com/tv.js"></script>
</head>

<body>

<h1>Advanced Stock Analytics Platform</h1>

<div class="grid">

<div class="card">
<h2>Trading Chart</h2>
<div id="tvchart"></div>
</div>

<div class="card">
<h2>Excel Portfolio Import</h2>
<input type="file" id="excelFile">
<button onclick="importExcel()">Import</button>
</div>

<div class="card">
<h2>Portfolio</h2>
<table id="portfolioTable"></table>
</div>

<div class="card">
<h2>Sector Allocation</h2>
<canvas id="sectorChart"></canvas>
</div>

<div class="card">
<h2>Risk Analytics</h2>
<button onclick="runMonteCarlo()">Monte Carlo Simulation</button>
<pre id="riskOutput"></pre>
</div>

<div class="card">
<h2>AI Recommendation</h2>
<button onclick="runAI()">Generate Signals</button>
<pre id="aiOutput"></pre>
</div>

<div class="card">
<h2>NSE Stock Screener</h2>
<button onclick="loadScreener()">Load Top Stocks</button>
<pre id="screener"></pre>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
