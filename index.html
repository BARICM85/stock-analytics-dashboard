<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NextGen Stock Analytics Platform</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://s3.tradingview.com/tv.js"></script>

</head>

<body>

<h1>NextGen Stock Analytics Dashboard</h1>

<div class="grid">

<div class="card">
<h2>Trading Chart</h2>
<div id="chart1"></div>
</div>

<div class="card">
<h2>Import Portfolio</h2>
<input type="file" id="excelFile">
<button onclick="importExcel()">Import Excel</button>
</div>

<div class="card">
<h2>Portfolio</h2>
<table id="portfolioTable"></table>
</div>

<div class="card">
<h2>Stock Screener</h2>
<button onclick="runScreener()">Load Screener</button>
<pre id="screenerOutput"></pre>
</div>

<div class="card">
<h2>Sector Allocation</h2>
<canvas id="sectorChart"></canvas>
</div>

<div class="card">
<h2>Nifty Index Comparison</h2>
<button onclick="loadIndex('^NSEI')">NIFTY 50</button>
<button onclick="loadIndex('^NSEBANK')">BANK NIFTY</button>
<p id="indexOutput"></p>
</div>

<div class="card">
<h2>Options Chain</h2>
<input id="optionSymbol" placeholder="Symbol">
<button onclick="loadOptions()">Load</button>
<pre id="optionsOutput"></pre>
</div>

<div class="card">
<h2>Monte Carlo Risk</h2>
<button onclick="runMonteCarlo()">Run Simulation</button>
<pre id="riskOutput"></pre>
</div>

<div class="card">
<h2>AI Portfolio Signals</h2>
<button onclick="runAI()">Generate</button>
<pre id="aiOutput"></pre>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
